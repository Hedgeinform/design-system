<!-- =============================================================
     arkadiy-ds / components / topbar.html
     v0.7 — mobile-pass.

     Sticky top chrome. Carries up to two identity marks per §8:
       • Center — Euler wordmark (brand of the practice)
       • Left   — Personal monogram (signature of the operator)
     Default state: both present. Any combination is permitted at
     project discretion — omit either, or both. To omit a mark, delete
     its element below; the layout re-flows naturally.

     v0.7 — mobile reflow (§8.2a, §8.3, §10).
     Below `--bp-narrow` (640px) the topbar reflows from a single
     active row into a two-row "epigraph" layout:
       • Row 1 (epigraph, hairline-thin) — meta-anchor (left slot)
         and the Euler wordmark (right slot, small).
       • Row 2 (active) — monogram + project name (left), nav and
         theme toggle (right).
     If the meta-anchor slot {{META_ANCHOR}} is left empty, the
     epigraph row is suppressed and Euler returns to the active row
     (compact behaviour) — see §8.3.

     Replace all {{PLACEHOLDER}} tokens with your project's strings.
     Requires tokens.css + typography.css (or equivalent vars).
     ============================================================= -->

<style>
  .ads-topbar {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(10px);
    background: rgb(from var(--bg) r g b / 0.82);
    border-bottom: 1px solid var(--rule);
    color: var(--ink-soft);
    transition: background 300ms ease, border-color 300ms ease, color 300ms ease;
  }

  /* ---------- Active row (desktop default; mobile row 2) ---------- */
  .ads-topbar-inner {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 14px var(--gutter);
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center;
    font-family: var(--font-mono); font-size: var(--meta-size);
    letter-spacing: var(--meta-tracking); text-transform: uppercase;
  }
  .ads-topbar-left  {
    display: flex; align-items: center; gap: 14px;
    text-align: left; min-width: 0;
  }
  .ads-topbar-left .sep { color: var(--ink-faint); }
  .ads-topbar-left .ads-topbar-tagline {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ads-topbar-right { display: flex; justify-content: flex-end; align-items: center; gap: 18px; }
  .ads-topbar-right a { color: var(--ink); text-decoration: none; }

  /* Personal monogram — §8.1. Inline SVG so currentColor inherits. */
  .ads-topbar-monogram {
    display: inline-flex; align-items: center;
    color: var(--accent);
    transition: color 300ms ease;
    flex: 0 0 auto;
  }
  .ads-topbar-monogram svg { display: block; }

  /* The Euler watermark — §8.2. Centered and large on desktop;
     migrates to the epigraph right slot on mobile (§8.2a). */
  .ads-topbar-euler {
    font-family: var(--font-display);
    font-style: italic; font-size: 17px; letter-spacing: 0.3px;
    text-transform: none; line-height: 1; white-space: nowrap;
    text-decoration: none; color: var(--accent);
    transition: color 300ms ease, font-size 200ms ease;
  }
  .ads-topbar-euler sup { font-style: italic; font-size: 0.7em; }

  /* Optional theme toggle — remove if the page is single-theme. */
  .ads-theme-toggle {
    background: transparent; border: 1px solid var(--rule);
    color: var(--ink-soft);
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 5px 9px; cursor: pointer; line-height: 1;
    display: inline-flex; align-items: center; gap: 7px;
    transition: border-color 200ms ease, color 200ms ease;
  }
  .ads-theme-toggle:hover { color: var(--ink); }
  .ads-theme-toggle .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
  }
  .ads-theme-toggle .label { /* hidden on narrow — see media query */ }

  /* ---------- Epigraph row (mobile only — §8.2a) ---------- */
  .ads-topbar-epigraph {
    display: none; /* hidden on desktop; revealed by media query */
    padding: 5px var(--gutter) 4px;
    border-bottom: 1px solid var(--rule);
    justify-content: space-between; align-items: baseline;
    font-family: var(--font-mono); font-size: 9.5px;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--ink-faint);
  }
  .ads-topbar-epigraph .meta-anchor { color: var(--ink-faint); }
  .ads-topbar-epigraph .ads-topbar-euler {
    font-size: 11px; letter-spacing: 0;
  }

  /* ---------- Mobile reflow ----------
     Threshold: --bp-narrow (640px by default; tokens.css §spacing).
     Behaviour:
       1. Active row collapses to space-between (2 columns) — Euler
          leaves the active row.
       2. Epigraph row appears above active row, carrying meta-anchor
          (left) + Euler (right, small).
       3. If meta-anchor is empty (no {{META_ANCHOR}} content), the
          epigraph row is suppressed via :has() and Euler is restored
          to the active row's centre slot (compact fallback, §8.3).
       4. Theme toggle drops its label, keeps the dot as an icon-button.
       5. Tagline truncates to ellipsis (already capped to 1 line).
  */
  @media (max-width: 640px) {
    .ads-topbar-inner {
      padding: 10px var(--gutter);
      grid-template-columns: 1fr auto;
    }
    /* Hide the central Euler in the active row by default;
       it lives in the epigraph instead. */
    .ads-topbar-inner > .ads-topbar-euler { display: none; }

    .ads-topbar-epigraph { display: flex; }

    /* Compact fallback (§8.3): if epigraph carries no meta-anchor
       content, the row hides itself and Euler returns to the active row. */
    .ads-topbar:not(:has(.ads-topbar-epigraph .meta-anchor:not(:empty))) .ads-topbar-epigraph {
      display: none;
    }
    .ads-topbar:not(:has(.ads-topbar-epigraph .meta-anchor:not(:empty))) .ads-topbar-inner {
      grid-template-columns: auto 1fr auto;
    }
    .ads-topbar:not(:has(.ads-topbar-epigraph .meta-anchor:not(:empty))) .ads-topbar-inner > .ads-topbar-euler {
      display: inline; justify-self: center; font-size: 15px;
    }

    /* Tagline behaviour — clamped to 1 line, truncates. */
    .ads-topbar-left .ads-topbar-tagline {
      max-width: 22ch;
    }

    /* Theme toggle becomes icon-only. */
    .ads-theme-toggle .label { display: none; }
    .ads-theme-toggle { padding: 5px; }
  }
</style>

<div class="ads-topbar">

  <!-- Epigraph row — mobile only, §8.2a. Suppressed when {{META_ANCHOR}} is empty. -->
  <div class="ads-topbar-epigraph">
    <span class="meta-anchor">{{META_ANCHOR}}</span>
    <a href="#euler" class="ads-topbar-euler" title="Euler's identity — the standard this practice is held to.">
      e<sup>i&pi;</sup> + 1 = 0
    </a>
  </div>

  <!-- Active row — both desktop and mobile. -->
  <div class="ads-topbar-inner">
    <span class="ads-topbar-left">
      <!-- Personal monogram (§8.1). Omit this <span> for an Euler-only topbar. -->
      <span class="ads-topbar-monogram" aria-label="AS">
        <svg viewBox="0 0 28 28" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.4">
          <g transform="skewX(-8)">
            <path d="M 3 24 L 11 4 L 19 24 M 6 17 L 16 17"/>
            <path d="M 25 8 Q 25 4 20 4 Q 15 4 15 8 Q 15 12 20 13 Q 25 14 25 19 Q 25 24 20 24 Q 15 24 15 20"/>
          </g>
        </svg>
      </span>
      <span class="sep">·</span>
      <span class="ads-topbar-tagline">{{NAME}} · {{TAGLINE}}</span>
    </span>

    <!-- Euler's identity — e^(iπ) + 1 = 0 — the wordmark (§8.2).
         Omit this <a> for a monogram-only topbar; the centre column collapses.
         On mobile, this element is hidden in favour of the epigraph copy above
         (§8.2a) — UNLESS the epigraph is suppressed by §8.3 fallback, in which
         case it reappears in the centre slot at compact size. -->
    <a href="#euler" class="ads-topbar-euler"
       title="Euler's identity — the standard this practice is held to.">
      e<sup>i&pi;</sup> + 1 = 0
    </a>

    <span class="ads-topbar-right">
      <a href="#archive" aria-label="{{NAV_LABEL}}">{{NAV_LABEL}}</a>
      <button class="ads-theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <span class="dot"></span>
        <span class="label">Dark</span>
      </button>
    </span>
  </div>
</div>

<script>
  // Theme toggle — applies data-theme to <html>, persists to localStorage.
  // Tokens.css reads [data-theme="light"] automatically.
  (function(){
    var html = document.documentElement;
    var saved = null; try { saved = localStorage.getItem('theme'); } catch(e){}
    html.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
    var btn = document.getElementById('theme-toggle');
    var label = btn && btn.querySelector('.label');
    function sync(){ if (label) label.textContent = html.getAttribute('data-theme') === 'light' ? 'Light' : 'Dark'; }
    sync();
    if (btn) btn.addEventListener('click', function(){
      var next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch(e){}
      sync();
    });
  })();
</script>
