<!-- =============================================================
     arkadiy-ds / components / monogram.html
     Personal monogram (AS) — geometric line-art mark, baked 8° skew.
     Inline SVG so currentColor inherits from parent context.
     Default size: 22px (topbar). Adjust width/height per §8.1.
     Color via parent's `color` property — set var(--accent) on dark
     surfaces, var(--ink) on tinted/light surfaces.
     ============================================================= -->

<span class="ads-monogram" style="color: var(--accent); display: inline-flex; align-items: center;" aria-label="AS">
  <svg viewBox="0 0 28 28" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.4" style="display: block;">
    <g transform="skewX(-8)">
      <path d="M 3 24 L 11 4 L 19 24 M 6 17 L 16 17"/>
      <path d="M 25 8 Q 25 4 20 4 Q 15 4 15 8 Q 15 12 20 13 Q 25 14 25 19 Q 25 24 20 24 Q 15 24 15 20"/>
    </g>
  </svg>
</span>
