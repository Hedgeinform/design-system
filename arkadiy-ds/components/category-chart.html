<!-- =============================================================
     arkadiy-ds / components / category-chart.html
     Timeline-by-category chart — events placed on a discrete Y-axis
     against a time X-axis. Used for activation timelines, signal
     timelines, state-change logs.
     One series → --accent dots. Multi-series → seriesColors(n).
     ============================================================= -->

<style>
  .ads-cat-card { border: 1px solid var(--rule); padding: 20px; background: var(--bg); }
  .ads-cat-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 16px;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.8px; text-transform: uppercase; color: var(--ink-soft);
  }
  .ads-cat-head .title { color: var(--ink); }
  .ads-cat-card svg { width: 100%; height: auto; display: block; }
  .ads-cat-card .axis text { font-family: var(--font-mono); font-size: 11px; fill: var(--data-axis); }
  .ads-cat-card .cat-label  { font-family: var(--font-body); font-size: 13px; fill: var(--ink-soft); }
  .ads-cat-card .gridline { stroke: var(--data-grid); stroke-width: 1; }
  .ads-cat-card .dot { fill: var(--accent); }
</style>

<div class="ads-cat-card">
  <div class="ads-cat-head">
    <span class="title">Activation timeline — by pattern</span>
    <span>Last 7d</span>
  </div>
  <svg viewBox="0 0 800 280" preserveAspectRatio="xMidYMid meet">
    <!-- Category rows (Y-axis) -->
    <g class="axis">
      <line class="gridline" x1="240" x2="780" y1="30"  y2="30" />
      <line class="gridline" x1="240" x2="780" y1="65"  y2="65" />
      <line class="gridline" x1="240" x2="780" y1="100" y2="100" />
      <line class="gridline" x1="240" x2="780" y1="135" y2="135" />
      <line class="gridline" x1="240" x2="780" y1="170" y2="170" />
      <line class="gridline" x1="240" x2="780" y1="205" y2="205" />
      <line class="gridline" x1="240" x2="780" y1="240" y2="240" />
    </g>
    <g>
      <text class="cat-label" x="230" y="34"  text-anchor="end">Reparenting events</text>
      <text class="cat-label" x="230" y="69"  text-anchor="end">Unleashed mode</text>
      <text class="cat-label" x="230" y="104" text-anchor="end">Approval-seeking</text>
      <text class="cat-label" x="230" y="139" text-anchor="end">Abandoned mode</text>
      <text class="cat-label" x="230" y="174" text-anchor="end">Lost possibility</text>
      <text class="cat-label" x="230" y="209" text-anchor="end">Results depreciation</text>
      <text class="cat-label" x="230" y="244" text-anchor="end">Protective grandiosity</text>
    </g>
    <!-- X axis labels -->
    <g class="axis">
      <text x="260" y="265" text-anchor="start">04-12</text>
      <text x="520" y="265" text-anchor="middle">04-15</text>
      <text x="780" y="265" text-anchor="end">04-18</text>
    </g>
    <!-- Event dots (r=4) -->
    <circle class="dot" cx="730" cy="30"  r="4" />
    <circle class="dot" cx="620" cy="65"  r="4" />
    <circle class="dot" cx="510" cy="100" r="4" />
    <circle class="dot" cx="425" cy="205" r="4" />
    <circle class="dot" cx="340" cy="240" r="4" />
    <circle class="dot" cx="260" cy="240" r="4" />
  </svg>
</div>
